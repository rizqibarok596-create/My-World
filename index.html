<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My World</title>
    <style>
        /* Desain Background: Putih, Minimalis, Elegan */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #ffffff; 
            font-family: 'Georgia', serif; /* Font klasik yang elegan */
            color: #333333;
            text-align: center;
        }

        /* Kotak Konten dengan bayangan sangat lembut */
        .container {
            max-width: 600px;
            padding: 50px 30px;
            background: #ffffff;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            border-radius: 20px;
            
            /* Animasi perlahan muncul (Fade In) */
            opacity: 0;
            animation: fadeIn 2.5s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        h1 {
            font-weight: normal;
            letter-spacing: 3px;
            margin-bottom: 15px;
            color: #444;
        }

        p {
            line-height: 1.8;
            margin-bottom: 30px;
            color: #666;
            font-size: 1.1em;
        }

        /* Desain Tombol Play */
        .btn-play {
            background-color: #fdfdfd;
            border: 1px solid #ddd;
            color: #555;
            padding: 12px 35px;
            font-size: 16px;
            font-family: inherit;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.4s ease;
            letter-spacing: 1.5px;
        }

        .btn-play:hover {
            background-color: #f0f0f0;
            border-color: #bbb;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        /* Menyembunyikan pemutar musik bawaan */
        audio {
            display: none;
        }

        /* Menyembunyikan pesan sebelum tombol diklik */
        #pesan-rahasia {
            display: none;
            margin-top: 30px;
            animation: fadeIn 2s forwards;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hello, My World</h1>
        <p>Ada sesuatu yang ingin aku sampaikan padamu.</p>
        
        <button class="btn-play" id="tombolBuka" onclick="bukaPesan()">Buka Pesan</button>
        
        <div id="pesan-rahasia">
            <p><i>(Tulis kata-kata romantismu di sini. Ceritakan betapa berartinya dia untukmu...)</i></p>
        </div>
    </div>

    <audio id="musikLatar" loop>
        <source src="lagu.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Logika Javascript agar tombol berfungsi
        function bukaPesan() {
            var musik = document.getElementById("musikLatar");
            var tombol = document.getElementById("tombolBuka");
            var pesan = document.getElementById("pesan-rahasia");
            
            // 1. Putar lagu
            musik.play(); 
            // 2. Hilangkan tombol
            tombol.style.display = "none"; 
            // 3. Munculkan pesan rahasia
            pesan.style.display = "block"; 
        }
    </script>

</body>
</html>
