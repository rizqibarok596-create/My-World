<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Kenangan ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink-soft: #ffcad4;
            --pink-bold: #f7a1c0;
            --text-dark: #4a4e69;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            text-align: center;
            background-color: #fafafa;
            background-image: 
                radial-gradient(circle at 50% 0%, #fff0f3 0%, transparent 60%),
                url("data:image/svg+xml,%3Csvg width='24' height='24' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23f7a1c0' fill-opacity='0.06' fill-rule='evenodd'%3E%3Ccircle cx='4' cy='4' r='1.5'/%3E%3Ccircle cx='16' cy='16' r='1.5'/%3E%3C/g%3E%3C/svg%3E");
            min-height: 100vh;
        }

        header {
            padding: 40px 20px 20px;
        }

        h1 { 
            font-family: 'Pacifico', cursive; 
            color: var(--pink-bold); 
            font-size: 2.2rem; 
            margin: 0 0 5px 0; 
        }
        
        p.subtitle { 
            font-size: 1rem; 
            color: #888; 
            margin: 0; 
            font-style: italic;
        }

        .container { 
            padding: 20px; 
            max-width: 600px; 
            margin: auto; 
        }

        /* --- DESAIN GRID GALERI --- */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Membuat 2 kolom sejajar */
            gap: 15px;
            margin-top: 20px;
        }

        .photo-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 8px;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03);
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: transform 0.3s ease;
        }

        .photo-card:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 25px rgba(247, 161, 192, 0.2);
        }

        .photo-card img {
            width: 100%;
            height: 200px; /* Tinggi foto dibuat seragam */
            object-fit: cover; /* Biar foto tidak gepeng */
            border-radius: 12px;
            display: block;
        }

        .caption {
            font-size: 0.85rem;
            color: #666;
            margin-top: 10px;
            margin-bottom: 5px;
            font-weight: 600;
        }

        /* Tombol Kembali */
        .btn-back {
            background: white;
            color: var(--pink-bold);
            border: 1px solid var(--pink-soft);
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            margin-top: 40px;
            margin-bottom: 30px;
        }

        .btn-back:hover { 
            background: var(--pink-soft); 
            color: white;
        }
    </style>
</head>
<body>

<header>
    <h1>Bingkai Kenangan 📸</h1>
    <p class="subtitle">Setiap jepretan adalah cerita tentang kita.</p>
</header>

<div class="container">
    <div class="gallery-grid">
        
        <div class="photo-card">
            <img src="foto1.jpg" alt="Kenangan 1">
            <div class="caption">My World ✨</div>
        </div>

        <div class="photo-card">
            <img src="foto2.jpg" alt="Kenangan 2">
            <div class="caption">My World ❤️</div>
        </div>

        <div class="photo-card">
            <img src="foto3.jpg" alt="Kenangan 3">
            <div class="caption">My World 🌍</div>
        </div>

        <div class="photo-card">
            <img src="foto4.jpg" alt="Kenangan 4">
            <div class="caption">My World</div>
        </div>

        <div class="photo-card">
            <img src="foto5.jpg" alt="Kenangan 5">
            <div class="caption">My World</div>
        </div>

        <div class="photo-card">
            <img src="foto6.jpg" alt="Kenangan 6">
            <div class="caption">My World</div>
        </div>
        
    </div>

    <a href="index.html" class="btn-back">⬅️ Kembali ke Halaman Utama</a>
</div>

</body>
</html>
